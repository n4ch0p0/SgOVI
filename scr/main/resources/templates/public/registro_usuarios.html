<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Registre Usuari - OVI')}"></head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-primary">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Registre de Nou Usuari OVI</h4>
        </div>
        <div class="card-body">
          <form th:action="@{/registro/usuario/add}" th:object="${usuario}" method="post">
            <div class="mb-3">
              <label class="form-label">DNI</label>
              <input type="text" class="form-control" th:field="*{dni}" required>
            </div>
            <div class="row mb-3">
              <div class="col">
                <label class="form-label">Nom</label>
                <input type="text" class="form-control" th:field="*{nom}" required>
              </div>
              <div class="col">
                <label class="form-label">Cognoms</label>
                <input type="text" class="form-control" th:field="*{cognoms}" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Correu Electrònic (Email)</label>
              <input type="email" class="form-control" th:field="*{email}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Telèfon</label>
              <input type="number" class="form-control" th:field="*{telefono}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Contrasenya</label>
              <input type="password" class="form-control" th:field="*{contrasenya}" required>
            </div>
            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" th:field="*{consentimentInformat}" id="consentiment">
              <label class="form-check-label" for="consentiment">
                Accepte el consentiment informat (Requerit)
              </label>
            </div>
            <button type="submit" class="btn btn-primary w-100">Registrar-me</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
