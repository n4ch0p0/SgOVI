<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Validar Assistents - Tècnic')}"></head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4">
    <h2><i class="bi bi-person-badge"></i> Assistents Pendents de Validació</h2>
    <hr>

    <table class="table table-striped table-hover mt-4 shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>DNI</th>
            <th>Tipus (Perfil)</th>
            <th>Formació</th>
            <th>Experiència</th>
            <th>Accions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="a : ${asistentes}">
            <td th:text="${a.dni}"></td>
            <td><span class="badge bg-info text-dark" th:text="${a.tipus}"></span></td>
            <td th:text="${a.formacioAcademica}"></td>
            <td th:text="${a.experienciaPrevia}"></td>
            <td>
                <form th:action="@{/tecnic/decidir-asistente}" method="post" class="d-inline">
                    <input type="hidden" name="dni" th:value="${a.dni}">
                    <input type="hidden" name="aceptado" value="true">
                    <button type="submit" class="btn btn-sm btn-success"><i class="bi bi-check-lg"></i> Acceptar</button>
                </form>

                <form th:action="@{/tecnic/decidir-asistente}" method="post" class="d-inline">
                    <input type="hidden" name="dni" th:value="${a.dni}">
                    <input type="hidden" name="aceptado" value="false">
                    <button type="submit" class="btn btn-sm btn-danger"><i class="bi bi-x-lg"></i> Rebutjar</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(asistentes)}">
            <td colspan="5" class="text-center text-muted py-4">No hi ha assistents pendents de validació ara mateix.</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/tecnic/dashboard}" class="btn btn-secondary mt-3">Tornar al Tauler</a>
</div>
</body>
</html>
