<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Les meues Converses</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>💬 Negociacions i Missatges</h2>
        <a href="/usuario/home" class="btn btn-outline-secondary">Tornar al Menú</a>
    </div>

    <div th:if="${#lists.isEmpty(missatges)}" class="alert alert-info shadow-sm">
        <p class="mb-0"><strong>Sense converses:</strong> Encara no has enviat ni rebut missatges en cap de les teues sol·licituds.</p>
    </div>

    <div th:unless="${#lists.isEmpty(missatges)}" class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Data</th>
                    <th>ID Selecció</th>
                    <th>Missatge</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${missatges}">
                    <td th:text="${m.fecha}">01/01/2024</td>
                    <td th:text="${m.idSeleccion}" class="fw-bold text-primary">1</td>
                    <td th:text="${m.mensaje}">Contenido del mensaje...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
