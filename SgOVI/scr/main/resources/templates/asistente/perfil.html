<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>El meu Perfil - SgOVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">El meu Perfil</h3>
            <a th:href="@{/asistente/dashboard}" class="btn btn-light btn-sm">Tornar al Dashboard</a>
        </div>
        <div class="card-body">

            <form th:action="@{/asistente/perfil/actualizar}" th:object="${asistente}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-bold">DNI</label>
                    <input type="text" class="form-control" th:field="*{dni}" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Tipus d'Assistent</label>
                    <input type="text" class="form-control" th:field="*{tipus}" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Formació Acadèmica</label>
                    <textarea class="form-control" th:field="*{formacioAcademica}" rows="3" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Experiència Prèvia</label>
                    <textarea class="form-control" th:field="*{experienciaPrevia}" rows="3" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Proximitat Geogràfica (Localitat/Codi Postal)</label>
                    <input type="text" class="form-control" th:field="*{proximitatGeografica}" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Guardar Canvis</button>
                </div>
            </form>

        </div>
    </div>
</div>

</body>
</html>
