<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Els meus Contractes - SgOVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Els meus Contractes</h3>
            <a th:href="@{/asistente/dashboard}" class="btn btn-light btn-sm">Tornar al Dashboard</a>
        </div>
        <div class="card-body">

            <p class="text-muted">Aquesta és la llista dels serveis que tens assignats actualment.</p>

            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead class="table-light">
                    <tr>
                        <th>ID Contracte</th>
                        <th>Usuari (Client)</th>
                        <th>Data Inici</th>
                        <th>Data Fi</th>
                        <th>Estat</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="contracte : ${registreContracteUsuarioOvis}">
                        <td th:text="${contracte.id}">1</td>
                        <td th:text="${contracte.dniPap}">12345678A</td>
                        <td th:text="${contracte.fecha_Inici}">01/01/2026</td>
                        <td th:text="${contracte.fecha_Fin}">31/12/2026</td>
                        <td>
                            <a th:if="${contracte.pdf_Path != null}" th:href="@{${contracte.pdf_Path}}" class="btn btn-sm btn-outline-danger" target="_blank">Veure PDF</a>
                            <span th:if="${contracte.pdf_Path == null}" class="text-muted">Sense PDF</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(registreContracteUsuarioOvis)}">
                        <td colspan="5" class="text-center text-muted">Encara no tens cap contracte assignat.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

</body>
</html>
