<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Els meus Contractes - OVI')}"></head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>

<div class="container mt-4">
    <h2><i class="bi bi-file-earmark-check-fill text-success"></i> Els meus Contractes</h2>
    <p class="text-muted">Ací pots consultar l'historial i l'estat dels teus registreContracteUsuarioOvis amb assistents personals.</p>
    <hr>

    <div class="table-responsive mt-4 shadow-sm">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID Contracte</th>
                <th>Assistent (DNI)</th>
                <th>Data d'Inici</th>
                <th>Data de Fi</th>
                <th>Estat</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${registreContracteUsuarioOvis}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.dniAsistente}"></td>
                <td th:text="${#temporals.format(c.dataInici, 'dd/MM/yyyy')}"></td>
                <td th:text="${#temporals.format(c.dataFi, 'dd/MM/yyyy')}"></td>
                <td>
                        <span class="badge"
                              th:classappend="${c.estat == 'Actiu' ? 'bg-success' : (c.estat == 'Finalitzat' ? 'bg-secondary' : 'bg-warning')}"
                              th:text="${c.estat}">
                        </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(registreContracteUsuarioOvis)}">
                <td colspan="5" class="text-center text-muted py-4">Encara no tens cap contracte registrat.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/usuario/dashboard}" class="btn btn-outline-secondary mt-3">Tornar al Tauler</a>
</div>
</body>
</html>
