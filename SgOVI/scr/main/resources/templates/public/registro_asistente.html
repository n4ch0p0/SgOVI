<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Registre Assistent - OVI')}"></head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-success">
        <div class="card-header bg-success text-white">
          <h4 class="mb-0">Registre d'Assistent (PAP / PATI)</h4>
        </div>
        <div class="card-body">
          <form th:action="@{/registro/asistente/add}" th:object="${asistente}" method="post">
            <div class="mb-3">
              <label class="form-label">DNI</label>
              <input type="text" class="form-control" th:field="*{dni}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Perfil / Tipus</label>
              <select class="form-select" th:field="*{tipus}">
                <option value="PAP">PAP (Professional d'Assistència Personal)</option>
                <option value="PATY">PATY (Acompanyament)</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Formació Acadèmica</label>
              <textarea class="form-control" th:field="*{formacioAcademica}" rows="2"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Experiència Prèvia</label>
              <textarea class="form-control" th:field="*{experienciaPrevia}" rows="2"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Proximitat Geogràfica (Localitat/Zona)</label>
              <input type="text" class="form-control" th:field="*{proximitatGeografica}">
            </div>
            <div class="alert alert-info" role="alert">
              <strong>Nota:</strong> Com que eres un assistent, la teua contrasenya d'accés per defecte serà el teu propi DNI.
            </div>
            <button type="submit" class="btn btn-success w-100">Enviar Sol·licitud d'Assistent</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
