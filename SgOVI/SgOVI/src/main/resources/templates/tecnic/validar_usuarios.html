<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Validar Usuaris - OVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Sol·licituds d'Usuaris Pendents</h3>
            <a th:href="@{/tecnic/dashboard}" class="btn btn-light btn-sm">Tornar al Panell</a>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>DNI</th>
                        <th>Nom</th>
                        <th>Accions (Aprova o indica motiu de rebuig)</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.dni}"></td>
                        <td th:text="${u.nom} + ' ' + ${u.cognoms}"></td>
                        <td>
                            <div class="d-flex gap-2">

                                <form th:action="@{/tecnic/validar-usuario}" method="post">
                                    <input type="hidden" name="dni" th:value="${u.dni}" />
                                    <input type="hidden" name="aceptado" value="true" />
                                    <button type="submit" class="btn btn-success btn-sm">Acceptar</button>
                                </form>

                                <form th:action="@{/tecnic/validar-usuario}" method="post" class="d-flex gap-2">
                                    <input type="hidden" name="dni" th:value="${u.dni}" />
                                    <input type="hidden" name="aceptado" value="false" />
                                    <input type="text" name="motiu" class="form-control form-control-sm" placeholder="Motiu si rebutges" style="max-width: 200px;" required>
                                    <button type="submit" class="btn btn-danger btn-sm">Rebutjar</button>
                                </form>

                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="3" class="text-center text-muted">No hi ha usuaris pendents de validació.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
