<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Supervisió de Contractes - OVI')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-earmark-check-fill"></i> Registre Global de Contractes</h2>
        <a th:href="@{/tecnic/dashboard}" class="btn btn-outline-secondary">Tornar al Menú</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Relació (Assistent - Client)</th>
                    <th>Data Inici</th>
                    <th>Data Fi</th>
                    <th>Estat</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${contractes}">
                    <td th:text="${c.id}" class="fw-bold"></td>
                    <td th:text="${c.dniAsistente}"></td>
                    <td th:text="${#temporals.format(c.dataInici, 'dd/MM/yyyy')}"></td>
                    <td th:text="${c.dataFi != null ? #temporals.format(c.dataFi, 'dd/MM/yyyy') : 'Indefinit'}"></td>
                    <td><span class="badge bg-success">Actiu</span></td>
                </tr>
                <tr th:if="${#lists.isEmpty(contractes)}">
                    <td colspan="5" class="text-center p-4 text-muted">No hi ha cap contracte formalitzat al sistema.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
