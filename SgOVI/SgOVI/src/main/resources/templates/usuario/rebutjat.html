<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Compte Rebutjat - OVI')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/nav :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow border-danger">
                <div class="card-body p-5">
                    <i class="bi bi-x-circle-fill text-danger" style="font-size: 4rem;"></i>
                    <h2 class="mt-3">Sol·licitud Rebutjada</h2>
                    <p class="lead text-muted mt-3">Ho sentim, però la teua sol·licitud d'accés com a persona usuària ha sigut denegada pel personal de l'OVI.</p>

                    <div class="alert alert-danger mt-4" role="alert">
                        <strong>Motiu del rebuig:</strong> <span th:text="${motiu}"></span>
                    </div>

                    <p class="mt-3">Si creus que és un error, posa't en contacte amb l'oficina.</p>
                    <a th:href="@{/logout}" class="btn btn-outline-secondary mt-3">Tornar a l'Inici</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
