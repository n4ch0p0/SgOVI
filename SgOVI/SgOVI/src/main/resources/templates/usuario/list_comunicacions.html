<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Les meues Converses - OVI')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-chat-dots"></i> Negociacions i Missatges</h2>
        <a th:href="@{/usuario/dashboard}" class="btn btn-outline-secondary">Tornar al Menú</a>
    </div>

    <div th:if="${#lists.isEmpty(converses)}" class="alert alert-info shadow-sm">
        <p class="mb-0"><strong>Sense converses:</strong> Encara no has iniciat cap negociació amb assistents.</p>
    </div>

    <div th:each="conv : ${converses}" class="card shadow-sm mb-5 border-primary">
        <div class="card-header bg-primary text-white d-flex justify-content-between">
            <span><i class="bi bi-person-fill"></i> Xat amb: <strong th:text="${conv.nomAp}"></strong></span>
            <span class="badge bg-light text-dark">Sol·licitud #<span th:text="${conv.idRequest}"></span></span>
        </div>

        <div class="card-body bg-white" style="max-height: 300px; overflow-y: auto;">
            <div th:each="m : ${conv.missatges}" class="mb-2">
                <div th:class="${m.emissor == 'Usuari'} ? 'text-end' : 'text-start'">
                    <span th:class="${m.emissor == 'Usuari'} ? 'badge bg-primary p-2' : 'badge bg-secondary p-2'"
                          th:text="${m.textMissatge}"></span>
                    <div class="text-muted small" th:text="${m.dataEnviament != null ? #temporals.format(m.dataEnviament, 'HH:mm') : ''}"></div>
                </div>
            </div>
            <p th:if="${#lists.isEmpty(conv.missatges)}" class="text-center text-muted small">No hi ha missatges encara. Comença la negociació!</p>
        </div>

        <div class="card-footer bg-light">
            <form th:action="@{/conversa/enviar}" method="post" class="row g-2">
                <input type="hidden" name="idConversa" th:value="${conv.idConversa}">

                <div class="col-md-10">
                    <input type="text" name="mensaje" class="form-control" required placeholder="Escriu ací el teu missatge...">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-send"></i> Enviar</button>
                </div>
            </form>
        </div>

        <div class="card-footer border-success">
            <p class="text-success fw-bold small mb-2"><i class="bi bi-file-earmark-check"></i> Si has arribat a un acord, registra el contracte:</p>
            <form th:action="@{/usuario/contractes/add}" method="post" class="row g-2">
                <input type="hidden" name="idRequest" th:value="${conv.idRequest}">
                <input type="hidden" name="idAp" th:value="${conv.idAp}">

                <div class="col-md-4">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">Inici</span>
                        <input type="date" name="fechaInici" class="form-control" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">Fi</span>
                        <input type="date" name="fechaFin" class="form-control">
                    </div>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-success btn-sm w-100">Registrar Contracte</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
