<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Perfil Rebutjat - OVI')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/nav :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow border-danger">
                <div class="card-body p-5">
                    <i class="bi bi-file-earmark-x-fill text-danger" style="font-size: 4rem;"></i>
                    <h2 class="mt-3">Candidatura Rebutjada</h2>
                    <p class="lead text-muted mt-3">El personal de l'OVI ha revisat la teua candidatura per a assistent i, de moment, ha sigut descartada.</p>

                    <div class="alert alert-danger mt-4" role="alert">
                        <strong>Motiu del rebuig:</strong> <span th:text="${motiu}"></span>
                    </div>

                    <a th:href="@{/logout}" class="btn btn-outline-secondary mt-4">Tornar a l'Inici</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
