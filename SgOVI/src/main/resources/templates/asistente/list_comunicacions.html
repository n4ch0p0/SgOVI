<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Sol·licituds de Conversa - OVI')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-chat-dots"></i> Sol·licituds de Conversa</h2>
        <a th:href="@{/asistente/dashboard}" class="btn btn-outline-secondary">Tornar al Menú</a>
    </div>

    <div th:if="${#lists.isEmpty(converses)}" class="alert alert-info shadow-sm">
        <p class="mb-0"><strong>Sense converses:</strong> Encara no has rebut cap missatge per a propostes de contracte.</p>
    </div>

    <div th:each="conv : ${converses}" class="card shadow-sm mb-5 border-info">
        <div class="card-header bg-info text-dark d-flex justify-content-between fw-bold">
            <span><i class="bi bi-person-lines-fill"></i> Negociació de la Sol·licitud #<span th:text="${conv.idRequest}"></span></span>
            <span class="badge bg-light text-dark border">Ref. Conversa: <span th:text="${conv.idConversa}"></span></span>
        </div>

        <div class="card-body bg-white" style="max-height: 300px; overflow-y: auto;">
            <div th:each="m : ${conv.missatges}" class="mb-2">
                <div th:class="${m.emissor == 'AP'} ? 'text-end' : 'text-start'">
                    <span th:class="${m.emissor == 'AP'} ? 'badge bg-info text-dark p-2' : 'badge bg-secondary p-2'"
                          th:text="${m.textMissatge}"></span>
                    <div class="text-muted small" th:text="${m.dataEnviament != null ? #temporals.format(m.dataEnviament, 'HH:mm') : ''}"></div>
                </div>
            </div>
            <p th:if="${#lists.isEmpty(conv.missatges)}" class="text-center text-muted small">No hi ha missatges encara.</p>
        </div>

        <div class="card-footer bg-light">
            <form th:action="@{/conversa/enviar}" method="post" class="row g-2">
                <input type="hidden" name="idConversa" th:value="${conv.idConversa}">

                <div class="col-md-10">
                    <input type="text" name="mensaje" class="form-control border-info" required placeholder="Escriu ací la teua resposta...">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-info w-100 text-dark"><i class="bi bi-send"></i> Respondre</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
