<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-people-fill me-2"></i>OVI Castelló
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Obrir menú de navegació">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item" th:if="${session.usuarioLogueado == null and session.asistenteLogueado == null and session.tecnicLogueado == null}">
                    <a class="btn btn-outline-light ms-2" href="/registro/seleccion">Registrar-se</a>
                </li>

                <li class="nav-item" th:if="${session.usuarioLogueado != null or session.asistenteLogueado != null or session.tecnicLogueado != null}">
                    <a class="btn btn-danger ms-2" th:href="@{/logout}">Tancar Sessió</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- Notificaciones Flash Globales -->
<div th:if="${mensajeExito}" class="container mt-2 mb-3">
    <div class="alert alert-success alert-dismissible fade show shadow-sm border-success" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><strong th:text="${mensajeExito}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Tancar"></button>
    </div>
</div>
<div th:if="${mensajeError}" class="container mt-2 mb-3">
    <div class="alert alert-danger alert-dismissible fade show shadow-sm border-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><strong th:text="${mensajeError}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Tancar"></button>
    </div>
</div>

</body>
</html>
