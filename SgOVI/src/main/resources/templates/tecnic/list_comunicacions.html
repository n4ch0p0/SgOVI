<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Xat amb Usuaris - Tècnic OVI')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-chat-left-text"></i> Comunicació amb Usuaris</h2>
        <a th:href="@{/tecnic/dashboard}" class="btn btn-outline-secondary">Tornar al Menú</a>
    </div>

    <!-- Formulari per iniciar conversa amb un usuari -->
    <div class="card shadow-sm mb-4 border-dark">
        <div class="card-body">
            <h6 class="fw-bold"><i class="bi bi-plus-circle"></i> Iniciar nova conversa</h6>
            <form th:action="@{/conversa/tecnic/iniciar}" method="post" class="row g-2 align-items-end">
                <div class="col-md-8">
                    <label class="form-label small text-muted">Selecciona l'Usuari</label>
                    <select name="dniUsuario" class="form-select" required>
                        <option value="" disabled selected>-- Tria un usuari --</option>
                        <option th:each="entry : ${mapaNomsUsuaris}" th:value="${entry.key}" th:text="${entry.value}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-dark w-100"><i class="bi bi-chat-dots"></i> Iniciar Xat</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(converses)}" class="alert alert-info shadow-sm">
        <p class="mb-0"><strong>Sense converses:</strong> Encara no hi ha cap conversa amb usuaris.</p>
    </div>

    <div th:each="conv : ${converses}" class="card shadow-sm mb-5 border-dark">
        <div class="card-header bg-dark text-white d-flex justify-content-between">
            <span><i class="bi bi-person-fill"></i> Xat amb: <strong th:text="${conv.nomUsuario}"></strong></span>
            <span class="badge bg-light text-dark" th:text="'DNI: ' + ${conv.dniUsuario}"></span>
        </div>

        <div class="card-body bg-white" style="max-height: 300px; overflow-y: auto;">
            <div th:each="m : ${conv.missatges}" class="mb-2">
                <div th:class="${m.emissor == 'Tecnic'} ? 'text-end' : 'text-start'">
                    <span th:class="${m.emissor == 'Tecnic'} ? 'badge bg-dark p-2' : 'badge bg-secondary p-2'"
                          th:text="${m.textMissatge}"></span>
                    <div class="text-muted small" th:text="${m.dataEnviament != null ? #temporals.format(m.dataEnviament, 'HH:mm') : ''}"></div>
                </div>
            </div>
            <p th:if="${#lists.isEmpty(conv.missatges)}" class="text-center text-muted small">No hi ha missatges encara.</p>
        </div>

        <div class="card-footer bg-light">
            <form th:action="@{/conversa/tecnic/enviar}" method="post" class="row g-2">
                <input type="hidden" name="idConversaTecnic" th:value="${conv.idConversaTecnic}">
                <div class="col-md-10">
                    <input type="text" name="mensaje" class="form-control" required placeholder="Escriu ací el teu missatge...">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-dark w-100"><i class="bi bi-send"></i> Enviar</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
