<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Validar Assistents - OVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Assistents Pendents de Validació</h2>
    <hr>
    <table class="table table-striped table-hover mt-4 shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>DNI</th>
            <th>Tipus (Perfil)</th>
            <th>Formació</th>
            <th>Accions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="a : ${asistentes}">
            <td th:text="${a.dni}"></td>
            <td><span class="badge bg-info text-dark" th:text="${a.tipus}"></span></td>
            <td th:text="${a.formacioAcademica}"></td>
            <td>
                <div class="d-flex gap-2">

                    <form th:action="@{/tecnic/decidir-asistente}" method="post">
                        <input type="hidden" name="dni" th:value="${a.dni}" />
                        <input type="hidden" name="aceptado" value="true" />
                        <button type="submit" class="btn btn-sm btn-success">Acceptar</button>
                    </form>

                    <form th:action="@{/tecnic/decidir-asistente}" method="post" class="d-flex gap-2">
                        <input type="hidden" name="dni" th:value="${a.dni}" />
                        <input type="hidden" name="aceptado" value="false" />
                        <input aria-label="Motiu de rebuig" type="text" name="motiu" class="form-control form-control-sm" placeholder="Motiu rebuig" style="max-width: 200px;" required>
                        <button type="submit" class="btn btn-sm btn-danger">Rebutjar</button>
                    </form>

                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(asistentes)}">
            <td colspan="4" class="text-center text-muted py-4">No hi ha assistents pendents de validació.</td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/tecnic/dashboard}" class="btn btn-secondary mt-3">Tornar al Tauler</a>
</div>
</body>
</html>
